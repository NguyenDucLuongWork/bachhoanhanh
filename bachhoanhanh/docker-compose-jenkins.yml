version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: bachhoanhanh-jenkins
    user: root
    restart: always
    ports:
      - "8100:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    entrypoint: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y docker.io curl -qq &&
        mkdir -p /usr/local/lib/docker/cli-plugins &&
        curl -SL https://github.com/docker/compose/releases/download/v2.27.1/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose &&
        chmod +x /usr/local/lib/docker/cli-plugins/docker-compose &&
        /usr/bin/tini -- /usr/local/bin/jenkins.sh
      "
    networks:
      - cicd-network

volumes:
  jenkins_data:

networks:
  cicd-network:
    name: cicd-network