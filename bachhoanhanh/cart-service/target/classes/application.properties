spring.application.name=cart-service
server.port=8088

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/cartdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER:http://localhost:8082/realms/bachhoanhanh}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK:http://localhost:8082/realms/bachhoanhanh/protocol/openid-connect/certs}
