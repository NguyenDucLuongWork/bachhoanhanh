spring.application.name=payment-service
server.port=8085

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}
eureka.instance.prefer-ip-address=true

# SePay
sepay.api-key=${SEPAY_API_KEY:}
sepay.qr-base-url=${SEPAY_QR_BASE_URL:https://qr.sepay.vn/img}
sepay.bank=${SEPAY_BANK:}
sepay.account=${SEPAY_ACCOUNT:}
sepay.template=${SEPAY_QR_TEMPLATE:compact}
sepay.order-prefix=${SEPAY_ORDER_PREFIX:DH}
