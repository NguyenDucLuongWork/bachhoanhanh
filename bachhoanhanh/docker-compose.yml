services:

  mariadb:
    image: mariadb:11
    container_name: bachhoanhanh-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: productdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - ./data:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bachhoanhanh-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/${NGINX_CONF}:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gateway-service
      - keycloak

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: keycloak
    command: start-dev --import-realm
    restart: always
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    ports:
      - "8082:8080"
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import

  product-service:
    build: ./product-service
    container_name: product-service
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_URL: ${PRODUCT_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started

  brand-service:
    build: ./brand-service
    container_name: brand-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      DB_URL: ${BRAND_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started

  order-service:
    build: ./order-service
    container_name: order-service
    restart: always
    ports:
      - "8081:8081"
    environment:
      DB_URL: ${ORDER_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_URL: ${EUREKA_URL}
    depends_on:
      product-service:
        condition: service_started
      eureka-server:
        condition: service_started

  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    restart: always
    ports:
      - "9000:9000"
    environment:
      EUREKA_URL: ${EUREKA_URL}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_JWK: ${JWT_JWK}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      eureka-server:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      redis:
        condition: service_healthy
