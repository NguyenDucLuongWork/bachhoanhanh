services:

  mariadb:
    image: mariadb:11
    container_name: bachhoanhanh-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10


  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"


  product-service:
    build: ./product-service
    container_name: product-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
      eureka-server:
        condition: service_started


  order-service:
    build: ./order-service
    container_name: order-service
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - product-service
      - eureka-server


  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "9000:9000"
    depends_on:
      - eureka-server
      - product-service
      - order-service