spring.application.name=gateway-service
server.port=9000

# CORS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true

# Route 0 - product-service with rate limiter
spring.cloud.gateway.routes[0].id=product-service
spring.cloud.gateway.routes[0].uri=lb://product-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/**
spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[0].args[redis-rate-limiter.replenishRate]=5
spring.cloud.gateway.routes[0].filters[0].args[redis-rate-limiter.burstCapacity]=5
spring.cloud.gateway.routes[0].filters[0].args[redis-rate-limiter.requestedTokens]=1
spring.cloud.gateway.routes[0].filters[0].args[key-resolver]=#{@ipKeyResolver}
spring.cloud.gateway.routes[0].filters[1].name=Retry
spring.cloud.gateway.routes[0].filters[1].args[retries]=3
spring.cloud.gateway.routes[0].filters[1].args[statuses]=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
spring.cloud.gateway.routes[0].filters[1].args[backoff.firstBackoff]=3000ms
spring.cloud.gateway.routes[0].filters[1].args[backoff.maxBackoff]=5000ms
spring.cloud.gateway.routes[0].filters[1].args[backoff.factor]=2
spring.cloud.gateway.routes[0].filters[1].args[backoff.basedOnPreviousValue]=false

# Route 1 - order-service
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/orders/**

# Route 2 - brand-service with rate limiter
spring.cloud.gateway.routes[2].id=brand-service
spring.cloud.gateway.routes[2].uri=lb://brand-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/brands/**
spring.cloud.gateway.routes[2].filters[0].name=RequestRateLimiter
spring.cloud.gateway.routes[2].filters[0].args[redis-rate-limiter.replenishRate]=5
spring.cloud.gateway.routes[2].filters[0].args[redis-rate-limiter.burstCapacity]=5
spring.cloud.gateway.routes[2].filters[0].args[redis-rate-limiter.requestedTokens]=1
spring.cloud.gateway.routes[2].filters[0].args[key-resolver]=#{@ipKeyResolver}
spring.cloud.gateway.routes[2].filters[1].name=Retry
spring.cloud.gateway.routes[2].filters[1].args[retries]=3
spring.cloud.gateway.routes[2].filters[1].args[statuses]=BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
spring.cloud.gateway.routes[2].filters[1].args[backoff.firstBackoff]=3000ms
spring.cloud.gateway.routes[2].filters[1].args[backoff.maxBackoff]=5000ms
spring.cloud.gateway.routes[2].filters[1].args[backoff.factor]=2
spring.cloud.gateway.routes[2].filters[1].args[backoff.basedOnPreviousValue]=false

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER:http://localhost:8082/realms/bachhoanhanh}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWT_JWK:http://localhost:8082/realms/bachhoanhanh/protocol/openid-connect/certs}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Logging
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE
logging.level.org.springframework.web=DEBUG

# Swagger UI
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Aggregate from services via Eureka
springdoc.swagger-ui.urls[0].name=product-service
springdoc.swagger-ui.urls[0].url=/aggregate/product-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=order-service
springdoc.swagger-ui.urls[1].url=/aggregate/order-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=brand-service
springdoc.swagger-ui.urls[2].url=/aggregate/brand-service/v3/api-docs

# Route 3 - product-service swagger docs
spring.cloud.gateway.routes[3].id=product-service-swagger
spring.cloud.gateway.routes[3].uri=lb://product-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/aggregate/product-service/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/aggregate/product-service/(?<remaining>.*), /${remaining}

# Route 4 - order-service swagger docs
spring.cloud.gateway.routes[4].id=order-service-swagger
spring.cloud.gateway.routes[4].uri=lb://order-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/aggregate/order-service/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/aggregate/order-service/(?<remaining>.*), /${remaining}

# Route 5 - brand-service swagger docs
spring.cloud.gateway.routes[5].id=brand-service-swagger
spring.cloud.gateway.routes[5].uri=lb://brand-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/aggregate/brand-service/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/aggregate/brand-service/(?<remaining>.*), /${remaining}

springdoc.api-docs.enabled=true