server {
    listen 80;
    server_name bachhoanhanh bachhoanhanh.com;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Keycloak
    location /auth/ {
        set $keycloak_upstream keycloak;
        rewrite ^/auth/(.*)$ /$1 break;
        proxy_pass http://$keycloak_upstream:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /auth;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Keycloak admin console and static/runtime endpoints
    location ~ ^/(admin|resources|realms)/ {
        set $keycloak_upstream keycloak;
        proxy_pass http://$keycloak_upstream:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API Gateway
    location / {
        set $gateway_upstream gateway-service;
        proxy_pass http://$gateway_upstream:9000;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
