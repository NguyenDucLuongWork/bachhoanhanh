spring.application.name=user-service
server.port=8086

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/userdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_URI:http://localhost:8082/realms/bachhoanhanh/protocol/openid-connect/certs}

#Swagger
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs